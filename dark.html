<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw v1 - Dark GitHub Theme</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, * { overflow-x: hidden; }
        pre, code, td, th, .message-text, .message-content, p, div { overflow-wrap: break-word; word-wrap: break-word; word-break: break-word; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0f1117;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #667eea; }
        * { scrollbar-width: thin; scrollbar-color: #2a2a3a #0f1117; }

        /* 4-column grid: icon-nav | sidebar | main | activity */
        .app {
            height: 100vh;
            display: grid;
            grid-template-columns: 60px 240px 1fr 380px;
            overflow: hidden;
        }

        /* ── Icon Nav ── */
        .icon-nav {
            background: #0d0d0d;
            border-right: 1px solid #1e1e2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            gap: 4px;
            min-height: 0;
            overflow-y: auto;
        }

        .nav-logo {
            font-size: 28px;
            padding: 8px 0 16px;
            cursor: default;
            user-select: none;
        }

        .nav-icon {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            transition: background 0.15s, color 0.15s;
            color: #666;
            position: relative;
        }

        .nav-icon:hover { background: #1a1a2e; color: #e0e0e0; }
        .nav-icon.active { background: #1a1a2e; color: #22c55e; }
        .nav-icon[title]::after {
            content: attr(title);
            position: absolute;
            left: 54px;
            background: #1a1d27;
            color: #e0e0e0;
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 100;
            border: 1px solid #333;
        }
        .nav-icon:hover[title]::after { opacity: 1; }

        .nav-spacer { flex: 1; }

        .nav-divider {
            width: 32px;
            height: 1px;
            background: #1e1e2e;
            margin: 4px 0;
        }

        /* Version Switcher */
        .vsw {
            display: flex;
            flex-direction: column;
            gap: 3px;
            padding: 4px 0;
        }
        .vsw a {
            display: block;
            padding: 3px 6px;
            font-size: 9px;
            color: #555;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 4px;
            text-decoration: none;
            text-align: center;
            transition: all 0.15s;
            font-weight: 600;
        }
        .vsw a:hover { background: #1a1a2e; color: #e0e0e0; border-color: #333; }
        .vsw a.current { background: #667eea; color: #fff; border-color: #667eea; }

        /* ── Panel edge toggle buttons ── */
        .panel-edge-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 48px;
            background: #1a1a2e;
            border: 1px solid #2a2a3a;
            color: #555;
            font-size: 11px;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            padding: 0;
            line-height: 1;
        }
        .panel-edge-btn:hover { background: #2a2a3e; color: #667eea; border-color: #667eea; }
        .panel-edge-left { left: 0; border-radius: 0 4px 4px 0; border-left: none; }
        .panel-edge-right { right: 0; border-radius: 4px 0 0 4px; border-right: none; }

        /* ── Sidebar ── */
        .sidebar {
            background: #0d0d0d;
            border-right: 1px solid #1e1e2e;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 16px;
        }

        #oc-new-chat {
            width: 100%;
            padding: 10px 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        #oc-new-chat:hover { opacity: 0.9; }

        .sidebar-tabs {
            display: flex;
            padding: 0 16px;
            gap: 0;
            border-bottom: 1px solid #1e1e2e;
        }

        .sidebar-tab {
            padding: 8px 16px;
            font-size: 12px;
            color: #666;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
        }
        .sidebar-tab:hover { color: #aaa; }
        .sidebar-tab.active { color: #667eea; border-bottom-color: #667eea; }

        #oc-sessions {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            min-height: 0;
        }

        .list-item {
            padding: 10px 12px;
            margin-bottom: 4px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
            background: transparent;
            border-left: 2px solid transparent;
        }
        .list-item:hover { background: #1a1a2e; }
        .list-item.active { background: #1a1a2e; border-left-color: #667eea; }
        .list-item-title { font-size: 13px; font-weight: 500; color: #e0e0e0; }
        .list-item-meta { font-size: 10px; color: #555; margin-top: 2px; }

        /* ── Main Panel ── */
        .main {
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
            background: #0f1117;
        }

        .main-header {
            padding: 12px 20px;
            border-bottom: 1px solid #1e1e2e;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .main-title-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .main-title {
            font-size: 15px;
            font-weight: 600;
            color: #e0e0e0;
        }

        #oc-model-subtitle {
            font-size: 11px;
            color: #667eea;
            cursor: pointer;
        }
        #oc-model-subtitle:hover { text-decoration: underline; }

        .main-header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-btn {
            background: none;
            border: 1px solid #2a2a3a;
            color: #888;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .header-btn:hover { background: #1a1a2e; color: #e0e0e0; border-color: #444; }

        /* Context Bar */
        .context-bar {
            padding: 8px 20px;
            border-bottom: 1px solid #1e1e2e;
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 11px;
            color: #666;
            background: rgba(13, 13, 13, 0.5);
        }

        .stat-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-label { color: #555; }
        .stat-value { color: #aaa; font-weight: 500; }

        .context-fill-bar {
            width: 60px;
            height: 4px;
            background: #1e1e2e;
            border-radius: 2px;
            overflow: hidden;
        }

        #oc-stat-context-fill {
            height: 100%;
            background: #667eea;
            border-radius: 2px;
            width: 0%;
            transition: width 0.3s;
        }

        /* Messages Area */
        #oc-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            min-height: 0;
        }

        .message {
            margin-bottom: 16px;
            animation: fadeIn 0.2s ease;
        }

        .message.user .message-header { justify-content: flex-end; }
        .message.user .message-text { background: rgba(102,126,234,0.08); border-radius: 8px; padding: 10px 14px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .avatar {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            flex-shrink: 0;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            font-weight: 600;
        }

        .avatar.user {
            background: linear-gradient(135deg, #22c55e, #16a34a);
        }

        .author {
            font-size: 13px;
            font-weight: 600;
            color: #e0e0e0;
        }

        .message-text {
            font-size: 14px;
            line-height: 1.7;
            color: #ccc;
            padding-left: 44px;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        /* Input Area */
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid #1e1e2e;
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: #0d0d0d;
        }

        #oc-input {
            flex: 1;
            background: #1a1a2e;
            border: 1px solid #2a2a3a;
            border-radius: 10px;
            padding: 12px 16px;
            color: #e0e0e0;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            min-height: 44px;
            max-height: 200px;
            outline: none;
            transition: border-color 0.15s;
        }
        #oc-input:focus { border-color: #667eea; }
        #oc-input::placeholder { color: #444; }

        #oc-send {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: opacity 0.15s, transform 0.1s;
        }
        #oc-send:hover { opacity: 0.9; }
        #oc-send:active { transform: scale(0.95); }
        #oc-send.oc-abort-mode { background: #ef4444; }

        /* ── Activity Panel ── */
        .activity {
            background: #0d0d0d;
            border-left: 1px solid #1e1e2e;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .activity-header {
            padding: 16px;
            border-bottom: 1px solid #1e1e2e;
        }

        .activity-title {
            font-size: 14px;
            font-weight: 600;
            color: #e0e0e0;
            margin-bottom: 8px;
        }

        .activity-tabs {
            display: flex;
            gap: 0;
        }

        .activity-tab {
            padding: 6px 12px;
            font-size: 11px;
            color: #666;
            cursor: pointer;
            border: 1px solid #2a2a3a;
            background: transparent;
            transition: all 0.15s;
        }
        .activity-tab:first-child { border-radius: 6px 0 0 6px; }
        .activity-tab:last-child { border-radius: 0 6px 6px 0; }
        .activity-tab:not(:first-child) { border-left: none; }
        .activity-tab:hover { color: #aaa; }
        .activity-tab.active { background: #1a1a2e; color: #667eea; border-color: #667eea; }

        #oc-activity {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            min-height: 80px;
        }

        /* Panel-level tabs (Activity / Cron) */
        .oc-panel-tabs { display: flex; gap: 0; }
        .oc-panel-tab {
            padding: 4px 12px;
            font-size: 11px;
            color: #666;
            background: none;
            border: 1px solid #333;
            cursor: pointer;
            transition: all 0.15s;
        }
        .oc-panel-tab:first-child { border-radius: 6px 0 0 6px; }
        .oc-panel-tab:last-child { border-radius: 0 6px 6px 0; }
        .oc-panel-tab:not(:first-child) { border-left: none; }
        .oc-panel-tab:hover { color: #aaa; }
        .oc-panel-tab.active { background: #1a1a2e; color: #667eea; border-color: #667eea; }

        /* Activity view holds the filter tabs + activity list */
        #oc-activity-view {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }
        #oc-activity-view.hidden { display: none; }

        /* Cron jobs panel */
        #oc-cron-panel {
            display: none;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }
        #oc-cron-panel.active { display: flex; }
        .cron-header {
            padding: 12px 16px;
            border-bottom: 1px solid #1e1e2e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .cron-header-title { font-weight: 600; font-size: 14px; color: #e0e0e0; }
        .cron-header-count { font-size: 11px; color: #666; }
        .cron-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0;
        }
        .cron-item {
            padding: 10px 16px;
            border-bottom: 1px solid #1a1a2a;
            cursor: default;
            transition: background 0.1s;
        }
        .cron-item:hover { background: rgba(102,126,234,0.06); }
        .cron-item-name {
            font-size: 13px;
            font-weight: 600;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .cron-item-name .cron-badge {
            font-size: 9px;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: all 0.15s;
        }
        .cron-badge-enabled { background: rgba(34,197,94,0.15); color: #22c55e; }
        .cron-badge-enabled:hover { background: rgba(34,197,94,0.3); }
        .cron-badge-disabled { background: rgba(239,68,68,0.15); color: #ef4444; }
        .cron-badge-disabled:hover { background: rgba(239,68,68,0.3); }
        .cron-item-schedule {
            font-size: 11px;
            color: #888;
            margin-top: 3px;
            font-family: Consolas, Monaco, monospace;
        }
        .cron-item-meta {
            font-size: 10px;
            color: #555;
            margin-top: 4px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .cron-item-meta span { white-space: nowrap; }
        .cron-status-ok { color: #22c55e; }
        .cron-status-error { color: #ef4444; }
        .cron-status-skipped { color: #f59e0b; }
        .cron-empty {
            padding: 32px 16px;
            text-align: center;
            color: #555;
            font-size: 13px;
        }

        /* Agent stream logs in bottom half */
        #oc-agent-logs {
            display: none;
            flex-direction: column;
            border-top: 1px solid #1e1e2e;
            min-height: 120px;
            flex: 1;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="app" data-grid-base="60px 240px 1fr 380px" data-nav-width="60px" data-sidebar-width="240px" data-activity-width="380px">

        <!-- Icon Nav -->
        <div class="icon-nav">
            <div class="nav-logo">&#129438;</div>
            <div class="nav-icon active" data-label="Chat" title="Chat">&#128172;</div>
            <div class="nav-icon" data-label="Agents" title="Agents">&#129302;</div>
            <div class="nav-icon" data-label="Sessions" title="Sessions">&#128203;</div>
            <div class="nav-icon" data-label="Skills" title="Skills">&#9889;</div>
            <div class="nav-icon" data-label="Channels" title="Channels">&#128225;</div>
            <div class="nav-icon" data-label="Cron" title="Cron">&#9200;</div>
            <div class="nav-icon" data-label="Logs" title="Logs">&#128196;</div>
            <div class="nav-icon" data-label="Nodes" title="Nodes">&#128421;</div>

            <div class="nav-spacer"></div>

            <div class="vsw">
                <a href="./index-original.html">Classic</a>
                <a href="./dark.html" class="current">Dark</a>
                <a href="./light.html">Light</a>
                <a href="./retro.html">Retro</a>
            </div>

            <div class="nav-divider"></div>
            <div class="nav-icon" data-label="Settings" title="Settings">&#9881;</div>
            <div class="nav-icon" data-label="Debug" title="Debug">&#128027;</div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar oc-sidebar-panel">
            <div class="sidebar-header">
                <button id="oc-new-chat">&#10024; New Chat</button>
            </div>
            <div class="sidebar-tabs">
                <button class="sidebar-tab active">Recent</button>
                <button class="sidebar-tab">Starred</button>
            </div>
            <div id="oc-sessions"></div>
        </div>

        <!-- Main Chat -->
        <div class="main oc-main-panel">
            <div class="main-header">
                <div class="main-title-area">
                    <span class="main-title">Main Session</span>
                    <div id="oc-model-subtitle"></div>
                </div>
                <div class="main-header-actions">
                    <button id="oc-export" class="header-btn">&#128228; Export</button>
                    <button id="oc-search" class="header-btn">&#128269; Search</button>
                </div>
            </div>

            <div class="context-bar">
                <div class="stat-group">
                    <span class="stat-label">Context</span>
                    <span class="stat-value" id="oc-stat-context">--/--</span>
                    <div class="context-fill-bar"><div id="oc-stat-context-fill"></div></div>
                    <span class="stat-value" id="oc-stat-context-pct">--%</span>
                </div>
                <div class="stat-group">
                    <span class="stat-label">Model</span>
                    <span class="stat-value" id="oc-stat-model">--</span>
                </div>
                <div class="stat-group">
                    <span class="stat-label">Cost</span>
                    <span class="stat-value" id="oc-stat-cost">$0.0000</span>
                </div>
            </div>

            <div id="oc-messages"></div>

            <div class="input-area">
                <textarea id="oc-input" placeholder="Type a message..." rows="1"></textarea>
                <button id="oc-send">&#9654;</button>
            </div>
        </div>

        <!-- Activity Panel -->
        <div class="activity oc-activity-panel">
            <div class="activity-header">
                <div class="activity-title">Activity</div>
                <div class="oc-panel-tabs">
                    <button class="oc-panel-tab active" data-panel="activity">Activity</button>
                    <button class="oc-panel-tab" data-panel="cron">Cron</button>
                </div>
            </div>
            <!-- Activity view -->
            <div id="oc-activity-view">
                <div class="activity-tabs">
                    <button class="activity-tab active">All</button>
                    <button class="activity-tab">Tools</button>
                    <button class="activity-tab">Agents</button>
                </div>
                <div id="oc-activity"></div>
            </div>
            <!-- Cron view -->
            <div id="oc-cron-panel">
                <div class="cron-header">
                    <span class="cron-header-title">Scheduled Jobs</span>
                    <span class="cron-header-count" id="oc-cron-count"></span>
                </div>
                <div class="cron-list" id="oc-cron-list"></div>
            </div>
        </div>

    </div>

    <script src="./render.js"></script>
    <script src="./panels.js"></script>
    <script src="./dark.js"></script>
    <script src="./chat.js"></script>
</body>
</html>
